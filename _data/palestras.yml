    speaker:
      name: "Andrea Schwertner Charão"
      bio: "- Possui doutorado em Informatique: Systèmes et Communications pelo Institut National Polytechnique de Grenoble (INPG), na França (2001), mestrado em Ciência da Computação pela Universidade Federal do Rio Grande do Sul (1996) e graduação em Informática (Bacharelado) pela Universidade Federal de Santa Maria (1993). Foi coordenadora do Curso de Bacharelado em CIência da Computação da Universidade Federal de Santa Maria, de 2013 a 2015, e tutora do grupo PET (Programa de Educação Tutorial) deste mesmo curso, de 2007 a 2010. Atualmente, exerce suas atividades docentes nos Cursos de Ciência da Computação e Sistemas de Informação (Bacharelado) e no Programa de Pós-Graduação em Ciência da Computação (Mestrado em Ciência da Computação). Tem experiência na área de Ciência da Computação, com ênfase em Sistemas de Computação, atuando principalmente nos seguintes temas: processamento de alto desempenho, programação paralela, aplicações paralelas e distribuídas, e educação em Computação."
      photo: "equipe-Andrea-Schwertner-Charao.png"
  
